<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiskForge Pro - Disk Scheduling Simulator</title>
    </head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background: #1e2937;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .sidebar {
            width: 280px;
            background: #1e2937;
            padding: 20px;
            border-right: 1px solid #334155;
        }
        .main {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 6px;
        }
        input {
            background: #334155;
            color: white;
            border: 1px solid #475569;
        }
        button {
            font-weight: bold;
            cursor: pointer;
        }
        .run { background: #22c55e; color: black; }
        .pause { background: #eab308; color: black; }
        .reset { background: #ef4444; color: white; }
        .random { background: #64748b; color: white; }
        .cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .card {
            background: #1e2937;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border-top: 5px solid;
        }
        .canvas-box {
            background: #1e2937;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        #chart { height: 200px !important; }
        #compareChart { height: 150px !important; }

        .output, .ranking {
            background: #1e2937;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            
        }
        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        </style>
<body>

<header>
    DiskForge Pro - Disk Scheduling Simulator
</header>

<div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Simulation Controls</h3>
        
        <label>Request Queue</label>
        <input id="requests" type="text" value="98,183,37,122,14,124,65,67">

        <label>Initial Head Position</label>
        <input id="head" type="number" value="53">

        <label>Disk Size (Max Cylinder)</label>
        <input id="diskSize" type="number" value="199">

        <button class="run" onclick="startSim()">Start Simulation</button>
        <button class="pause" id="pauseButton" onclick="pauseAnim()">Pause Animation</button>
        <button class="reset" onclick="resetSim()">Reset All</button>
        <button class="random" onclick="randomInput()">Random Requests</button>

        <div style="margin-top:15px;">
            <label>Animation Speed: <span id="speedShow">300</span> ms</label>
            <input type="range" id="animSpeed" min="50" max="800" value="300" oninput="changeSpeed(this.value)">
        </div>
    </div>

    <!-- Main Area -->
    <div class="main">
        <div class="cards">
            <div class="card" id="fcfsCard" style="border-color:#22d3ee">
                <h4>FCFS</h4>
                <div id="fcfsVal" style="font-size:28px; font-weight:bold; color:#22d3ee">—</div>
            </div>
            <div class="card" id="sstfCard" style="border-color:#eab308">
                <h4>SSTF</h4>
                <div id="sstfVal" style="font-size:28px; font-weight:bold; color:#eab308">—</div>
            </div>
            <div class="card" id="scanCard" style="border-color:#22c55e">
                <h4>SCAN</h4>
                <div id="scanVal" style="font-size:28px; font-weight:bold; color:#22c55e">—</div>
            </div>
            <div class="card" id="cscanCard" style="border-color:#c026d3">
                <h4>C-SCAN</h4>
                <div id="cscanVal" style="font-size:28px; font-weight:bold; color:#c026d3">—</div>
            </div>
        </div>

        <div class="canvas-box">
            <h4>Head Movement Animation</h4>
            <canvas id="chart"></canvas>
        </div>

        <div class="split">
            <div>
                <h4>Detailed Output</h4>
                <div class="output" id="output"></div>
            </div>
            <div>
                <h4>Ranking</h4>
                <div class="ranking" id="ranking"></div>
            </div>
        </div>

        <div class="canvas-box">
            <h4>Algorithm Performance Comparison</h4>
            <canvas id="compareChart"></canvas>
        </div>
    </div>
</div>
<script>
// Simple Disk Scheduling Simulator
// OS Lab Project

let maxDisk = 199;   // disk size

// FCFS
function doFCFS(requests, start) {
    let sequence = [start];
    let totalSeek = 0;
    let current = start;
    
    for(let i = 0; i < requests.length; i++) {
        totalSeek = totalSeek + Math.abs(current - requests[i]);
        current = requests[i];
        sequence.push(current);
    }
    return [sequence, totalSeek];
}
// SSTF
function doSSTF(requests, start) {
    let pending = [];
    for(let i = 0; i < requests.length; i++) {
        pending.push(requests[i]);
    }
    
    let sequence = [start];
    let totalSeek = 0;
    let current = start;
    
    while(pending.length > 0) {
        let best = pending[0];
        let minDist = Math.abs(current - best);
        
        for(let i = 1; i < pending.length; i++) {
            let dist = Math.abs(current - pending[i]);
            if(dist < minDist) {
                minDist = dist;
                best = pending[i];
            }
        }
        
        totalSeek = totalSeek + minDist;
        current = best;
        sequence.push(current);
        
        // remove used request
        for(let i = 0; i < pending.length; i++) {
            if(pending[i] === best) {
                pending.splice(i, 1);
                break;
            }
        }
    }
    return [sequence, totalSeek];
}

</script>
</body>
</html>
